correlations:
  max_lag: 40                         # Максимальный лаг k: от -max_lag до +max_lag
  localization_radius: 3              # Радиус окрестности k = 0 для доли локализации

detector:
  late_time_fraction: 0.5
  max_width: 9.0
  min_central_amplitude_ratio: 0.4
  min_peak_to_background_ratio: 5.0
  max_tail_fit_error: 0.25
  min_tail_fit_lag: 4
  profile_psd_tolerance: 1.0e-10
  oscillatory_tail_preferred: true

numerics:
  max_relative_energy_drift_warning: 1.0e-3

plots:
  enabled: true
  late_time_start_for_plateau: 15.0
