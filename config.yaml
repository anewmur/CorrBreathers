experiment:
  output_dir: "results"              # Каталог, куда записываются все результаты расчёта: json, npz, txt, png
  random_seed: 12345                 # Начальное значение генератора случайных чисел для воспроизводимости эксперимента
  ensemble_size: 100                 # Число независимых реализаций в ансамбле, по которым выполняется усреднение корреляций
  save_every_steps: 10               # Сохранять диагностики и корреляционные профили каждые N шагов интегрирования
  total_steps: 10000                   # Полное число шагов интегрирования по времени

chain:
  length: 256                        # Число узлов в периодической цепочке
  mass: 1.0                          # Масса одной частицы
  stiffness: 1.0                     # Линейная жёсткость связи между соседними частицами
  beta: 0.2                          # Коэффициент кубической нелинейности в силе β-FPU-цепочки
  dt: 0.01                           # Шаг по времени для интегратора velocity-Verlet


initial_conditions:
  mode: "correlated_velocity"        # Режим задания начальных условий: "random_thermal" или "correlated_velocity"
  random_thermal_std: 1.0            # Среднеквадратичное отклонение скоростей в режиме "random_thermal"
  amplitude: 1.0                     # Амплитуда целевой начальной ковариации скоростей в режиме "correlated_velocity"
  alpha: 0.25                        # Параметр экспоненциального убывания начальной ковариации по лагу k
  zero_displacements: true           # Если true, все начальные смещения равны нулю
  covariance_psd_tolerance: 1.0e-10  # Численный допуск при проверке неотрицательности спектра заданной ковариации
  covariance_negative_warning_tolerance: 1.0e-8  # Порог, ниже которого отрицательные спектральные значения считаются численным шумом
  remove_center_of_mass_velocity: false  # Если true, из каждой реализации вычитается средняя скорость по узлам; это меняет исходную ковариацию


